<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Styles for the video background */
        video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1; /* Place the video behind other content */
        }

        /* Styles for the login page (white background, login form, etc.) */
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: transparent; /* Set background to transparent */
        }

        .container {
            position: relative;
        }

        .login-form {
            background: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.5); /* Add a shadow to the form */
        }

        .login-form h2 {
            text-align: center;
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7); /* Add text shadow to the heading */
        }

        .login-form label {
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5); /* Add text shadow to labels */
        }

        .login-form input[type="text"],
        .login-form input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #cccccc; /* Add a border to input fields */
        }

        .login-form .error-message {
            color: red;
        }

        .login-form input[type="password"] {
            /* Disable autofill for the password field */
            -webkit-autofill: off;
        }

        .login-form input[type="submit"] {
            background-color: black;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .login-form input[type="submit"]:hover {
            background-color: #333; /* Darken the background on hover */
        }

        /* Styles for the verification message and animation */
        .verification-box {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgb(255, 226, 129); /* Change the color to white */
            width: 4cm; /* Set the width to 4cm */
            height: 1.5cm; /* Set the height to 1.5cm */
            border-radius: 3px;
            z-index: 1;
            text-align: center;
        }

        .verification-message {
            font-size: 14px;
            margin: 5px;
        }

        .verification-animation {
            max-width: 100%; /* Adjust the size of the animation to fit the verification box */
            max-height: 100%; /* Adjust the size of the animation to fit the verification box */
            display: block;
            margin: 0 auto; /* Center the animation horizontally */
        }
    </style>
</head>
<body>
    <!-- Embed the specified video and set it to loop -->
    <video autoplay loop muted>
        <source src="4K Planet Earth Spinning in Space _ Free HD Videos - No Copyright.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <div class="container">
        <div class="login-form">
            <h2>Login</h2>
            <form id="login" onsubmit="return showVerificationMessage()">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" value=""><br>

                <label for="password">Password:</label>
                <input type="password" id="password" name="password" value=""><br>

                <label for="neuralink-no">Neuralink No:</label>
                <input type="text" id="neuralink-no" name="neuralink-no"><br>

                <label for="teleportation-id">Teleportation ID:</label>
                <input type="text" id="teleportation-id" name="teleportation-id"><br>

                <input type="submit" value="Login" id="login-button" disabled>
                <p id="error-text" class="error-message" style="display: none; color: red;">*Enter the information</p>
            </form>
        </div>

        <!-- Verification message and animation -->
        <div class="verification-box">
            <p class="verification-message">Verifying...</p>
            <img class="verification-animation" src="https://miro.medium.com/v2/resize:fit:1400/1*CsJ05WEGfunYMLGfsT2sXA.gif" alt="Verification Animation">
        </div>
    </div>

    <!-- Your JavaScript code here -->
    <script>
        // Function to enable/disable the login button based on field values
        function updateLoginButton() {
            var usernameInput = document.getElementById("username");
            var passwordInput = document.getElementById("password");
            var neuralinkNoInput = document.getElementById("neuralink-no");
            var teleportationIdInput = document.getElementById("teleportation-id");
            var loginButton = document.getElementById("login-button");
            var errorText = document.getElementById("error-text");

            // Check if all required fields have values and neuralink-no and teleportation-id are numbers
            if (
                usernameInput.value.trim() !== "" &&
                passwordInput.value.trim() !== "" &&
                !isNaN(neuralinkNoInput.value) && // Check if it's a number
                !isNaN(teleportationIdInput.value) && // Check if it's a number
                neuralinkNoInput.value.trim() !== "" &&
                teleportationIdInput.value.trim() !== ""
            ) {
                loginButton.removeAttribute("disabled");
                errorText.style.display = "none"; // Hide the error text
            } else {
                loginButton.setAttribute("disabled", "disabled");
                errorText.style.display = "block"; // Show the error text
            }
        }

        // Add event listeners to input fields to update the button
        var formInputs = document.querySelectorAll("input[type='text'], input[type='password']");
        formInputs.forEach(function(input) {
            input.addEventListener("input", updateLoginButton);
        });

        // Initial check for the login button
        updateLoginButton();

        // Function to show the verification message
        function showVerificationMessage() {
            // Show the verification message and animation for 2 seconds
            var verificationBox = document.querySelector(".verification-box");
            verificationBox.style.display = "block";
            setTimeout(function() {
                verificationBox.style.display = "none";
                window.location.href = "destination.html"; // Redirect to the destination page
            }, 2000); // 2 seconds

            // Prevent the form submission
            return false;
        }
    </script>
</body>
</html>
